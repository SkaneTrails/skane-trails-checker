name: Auto-approve Renovate PRs
on:
  pull_request:
    branches: ["main"]
    types: [opened]

run-name: ${{ format('Auto-approve {0}', github.event.pull_request.title) }}

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'renovate[bot]' &&
      (contains(github.event.pull_request.labels.*.name, '🧹 renovate') ||
      startsWith(github.event.pull_request.head.ref, 'renovate/'))
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Auto-approve Renovate PR with automerge enabled
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            if (body.includes('**Automerge**: Enabled')) {
              core.info('PR has automerge enabled - approving');

              try {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  event: 'APPROVE',
                  body: `Auto-approved Renovate PR: "${pr.title}" (automerge enabled)`
                });
                core.info('✓ Successfully approved PR');
              } catch (error) {
                core.setFailed(`Failed to approve PR: ${error.message}`);
              }
            } else {
              core.info('PR does not have automerge enabled - skipping approval');
            }
