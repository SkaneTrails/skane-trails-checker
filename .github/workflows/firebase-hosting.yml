name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/firebase-hosting.yml"
  workflow_dispatch:

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/st-github-actions/providers/github-provider
          service_account: st-gh-actions-firebase@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: mobile
        run: pnpm install --frozen-lockfile

      - name: Fetch secrets from GCP Secret Manager
        id: secrets
        run: |
          API_URL=$(gcloud secrets versions access latest --secret=st_github_EXPO_PUBLIC_API_URL --project="${{ env.GCP_PROJECT_ID }}")
          API_KEY=$(gcloud secrets versions access latest --secret=st_github_EXPO_PUBLIC_FIREBASE_API_KEY --project="${{ env.GCP_PROJECT_ID }}")
          APP_ID=$(gcloud secrets versions access latest --secret=st_github_EXPO_PUBLIC_FIREBASE_APP_ID --project="${{ env.GCP_PROJECT_ID }}")
          SENDER_ID=$(gcloud secrets versions access latest --secret=st_github_EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID --project="${{ env.GCP_PROJECT_ID }}")
          CLIENT_ID=$(gcloud secrets versions access latest --secret=skane-trails_oauth_client_id --project="${{ env.GCP_PROJECT_ID }}")

          echo "::add-mask::$API_URL"
          echo "::add-mask::$API_KEY"
          echo "::add-mask::$APP_ID"
          echo "::add-mask::$SENDER_ID"
          echo "::add-mask::$CLIENT_ID"

          {
            echo "EXPO_PUBLIC_API_URL=$API_URL"
            echo "EXPO_PUBLIC_FIREBASE_API_KEY=$API_KEY"
            echo "EXPO_PUBLIC_FIREBASE_APP_ID=$APP_ID"
            echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$SENDER_ID"
            echo "EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=$CLIENT_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Build web app
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ steps.secrets.outputs.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ steps.secrets.outputs.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ steps.secrets.outputs.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ steps.secrets.outputs.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ steps.secrets.outputs.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ env.GCP_PROJECT_ID }}.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ env.GCP_PROJECT_ID }}.firebasestorage.app
        run: npx expo export --platform web

      - name: Deploy to Firebase Hosting
        working-directory: mobile
        run: npx firebase-tools deploy --only hosting --project ${{ env.GCP_PROJECT_ID }}
