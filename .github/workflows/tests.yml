name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest -n auto --tb=short --durations=10 --cov -v

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [pre-commit, ruff-check, ruff-format, deptry, ty]

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Cache pre-commit environments
        if: matrix.check == 'pre-commit'
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            pre-commit)
              SKIP=terraform_fmt,terraform_trivy uv run pre-commit run --all-files
              ;;
            ruff-check)
              uv run ruff check .
              ;;
            ruff-format)
              uv run ruff format --check .
              ;;
            deptry)
              uv run deptry .
              ;;
            ty)
              uv run ty check app/ --fail-on-warning
              ;;
          esac
