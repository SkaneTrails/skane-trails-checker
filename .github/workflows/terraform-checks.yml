name: Terraform Checks

on:
  pull_request:
    paths:
      - "infra/**/*.tf"
      - "infra/**/*.tfvars.example"
      - ".github/workflows/terraform-checks.yml"
      - ".tflint.hcl"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - dev
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.2.0
        with:
          terraform_version: "~1.12"

      - name: Terraform Format Check
        run: |
          echo "Checking Terraform formatting..."
          terraform fmt -check -recursive infra/

      - name: Terraform Init
        working-directory: infra/environments/${{ matrix.environment }}
        run: |
          echo "Initializing main configuration..."
          terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra/environments/${{ matrix.environment }}
        run: |
          echo "Validating main configuration..."
          terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: latest

      - name: Initialize TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: |
          echo "Running TFLint..."
          cd infra
          tflint --recursive --config="${GITHUB_WORKSPACE}/.tflint.hcl" --format compact

  terraform-plan:
    name: Terraform Plan (Authenticated)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
      TF_DIR: infra/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.2.0
        with:
          terraform_version: "~1.12"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/st-github-actions/providers/github-provider
          service_account: st-gh-actions-terraform@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Reconstruct gitignored files
        working-directory: ${{ env.TF_DIR }}
        run: |
          mkdir -p access
          printf '%s\n' "${{ secrets.TF_SUPERUSERS }}" > access/superusers.txt
          printf '%s\n' '${{ secrets.TF_VARS_FILE }}' > terraform.tfvars

          # Partial backend config — actual bucket/prefix come from -backend-config flags
          printf 'terraform {\n  backend "gcs" {}\n}\n' > backend.tf

          # Mask each line to avoid leaking PII in plan output
          for f in access/superusers.txt terraform.tfvars; do
            if [ -f "$f" ]; then
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "::add-mask::$line"
                fi
              done < "$f"
            fi
          done

      - name: Terraform init
        id: init
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ secrets.TF_BACKEND_PREFIX }}"

      - name: Terraform validate
        id: validate
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "plan_exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        if: always() && github.event_name == 'pull_request'
        env:
          INIT_OUTCOME: ${{ steps.init.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const icon = (outcome) => outcome === 'success' ? '✅' : '❌';

            const body = [
              '## Terraform Plan — PR Summary',
              '',
              '| Step | Result |',
              '| ---- | ------ |',
              `| Init | ${icon(process.env.INIT_OUTCOME)} |`,
              `| Validate | ${icon(process.env.VALIDATE_OUTCOME)} |`,
              `| Plan | ${icon(process.env.PLAN_OUTCOME)} |`,
              '',
              '_Full plan output is available in the [workflow logs](' + runUrl + ')._',
              '',
              `*Pushed by @${context.actor}, commit \`${context.sha.substring(0, 7)}\`*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Terraform Plan — PR Summary';
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Write job summary
        if: always()
        run: |
          icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }

          {
            echo "## Terraform Plan"
            echo ""
            echo "| Step | Result |"
            echo "| ---- | ------ |"
            echo "| Init | $(icon "${{ steps.init.outcome }}") |"
            echo "| Validate | $(icon "${{ steps.validate.outcome }}") |"
            echo "| Plan | $(icon "${{ steps.plan.outcome }}") |"
            echo ""
            echo "> Full plan output is available in the Terraform plan step logs above."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check results
        if: always()
        run: |
          if [ "${{ steps.validate.outcome }}" != "success" ]; then
            echo "::error::Terraform validation failed."
            exit 1
          fi
          if [ "${{ steps.plan.outcome }}" != "success" ]; then
            echo "::error::Terraform plan failed."
            exit 1
          fi
