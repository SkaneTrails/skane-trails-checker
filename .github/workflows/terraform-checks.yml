name: Terraform Checks

on:
  pull_request:
    paths:
      - "infra/**/*.tf"
      - "infra/**/*.tfvars.example"
      - ".github/workflows/terraform-checks.yml"
      - ".tflint.hcl"
  push:
    branches: [main]
    paths:
      - "infra/**/*.tf"
      - "infra/**/*.tfvars.example"
      - ".github/workflows/terraform-checks.yml"
      - ".tflint.hcl"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - dev
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.2.0
        with:
          terraform_version: "~1.12"

      - name: Terraform Format Check
        run: |
          echo "Checking Terraform formatting..."
          terraform fmt -check -recursive infra/

      - name: Terraform Init
        working-directory: infra/environments/${{ matrix.environment }}
        run: |
          echo "Initializing main configuration..."
          terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra/environments/${{ matrix.environment }}
        run: |
          echo "Validating main configuration..."
          terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@4cb9feea73331a35b422df102992a03a44a3bb33 # v6.2.1
        with:
          tflint_version: latest

      - name: Initialize TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: |
          echo "Running TFLint..."
          cd infra
          tflint --recursive --config="${GITHUB_WORKSPACE}/.tflint.hcl" --format compact

  trivy-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    env:
      TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
      TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.5
        with:
          cache: true

      - name: Create cache directory
        run: mkdir -p ${{ env.TRIVY_CACHE_DIR }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Restore Trivy cache
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: cache-trivy-iac-${{ steps.date.outputs.date }}
          restore-keys: cache-trivy-iac-

      - name: Run Trivy IaC scan
        run: |
          echo "Scanning Terraform files for security issues..."
          trivy config \
            --format json \
            --output trivy-iac-results.json \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            --cache-dir ${{ env.TRIVY_CACHE_DIR }} \
            infra/

      - name: Check results
        run: |
          if [ "$(jq '[.Results[]? | select(.Misconfigurations) | .Misconfigurations | length] | add // 0' trivy-iac-results.json)" -gt "0" ]; then
            echo "⚠️ Security issues found in Terraform"
            trivy config --format table infra/
          else
            echo "✅ No security issues found"
          fi

      - name: Generate SARIF report
        run: |
          trivy convert --format sarif --output trivy-iac-results.sarif trivy-iac-results.json

      - name: Upload Trivy IaC results to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@19b2f06db2b6f5108140aeb04014ef02b648f789 # v4.31.11
        with:
          sarif_file: trivy-iac-results.sarif
          category: trivy-iac-scan

      - name: Upload Trivy results as artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: trivy-iac-scan-results
          path: |
            trivy-iac-results.json
            trivy-iac-results.sarif
          retention-days: 30
