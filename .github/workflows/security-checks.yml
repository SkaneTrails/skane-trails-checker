name: Security Checks

on:
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 6 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # security-events: write # Re-enable with Trivy for SARIF upload

jobs:
  license-scan:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Generate SBOM
        run: |
          echo "Generating Software Bill of Materials..."
          uv pip list --format json > sbom-packages.json
          echo "📦 SBOM generated: sbom-packages.json"

      - name: Scan for problematic licenses
        run: |
          echo "Scanning for GPL, LGPL, and other copyleft licenses..."

          # Install pip-licenses for license detection
          uv pip install pip-licenses

          # Generate license report
          uv run pip-licenses \
            --format=json \
            --with-urls \
            --with-description \
            --output-file=licenses.json

          # Check for problematic licenses
          PROBLEMATIC_LICENSES="GPL|LGPL|AGPL|SSPL|Commons Clause"

          if uv run pip-licenses --format=plain | grep -iE "$PROBLEMATIC_LICENSES"; then
            echo "::error::❌ Found problematic copyleft licenses!"
            echo "The following packages have GPL/LGPL/AGPL licenses:"
            uv run pip-licenses --format=markdown | grep -iE "$PROBLEMATIC_LICENSES" || true
            exit 1
          else
            echo "✅ No problematic licenses found"
          fi

      - name: Upload SBOM as artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-licenses
          path: |
            sbom-packages.json
            licenses.json
          retention-days: 30

  # TODO: Re-enable when aquasecurity/trivy repo has releases again
  # trivy-scan:
  #   name: Trivy Vulnerability Scan
  #   ...
