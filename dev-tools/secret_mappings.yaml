# Mapping of Secret Manager secret names to .env variable names
# Format: secret_name: ENV_VAR_NAME

dev:
  firestore-database-name: FIRESTORE_DATABASE_ID
  firestore-project-id: FIRESTORE_PROJECT_ID
  firestore-location-id: FIRESTORE_LOCATION_ID
# Future environments can be added here
# prod:
#   firestore-database-name-prod: FIRESTORE_DATABASE
